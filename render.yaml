services:
  - type: web
    name: oddsedge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: CACHE_TTL
        value: "1800"
      - key: PYTHON_VERSION
        value: "3.12.0"
