<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none" aria-label="OddsEdge logo">
        <defs>
          <linearGradient id="brandGrad" x1="0" y1="0" x2="48" y2="48">
            <stop stop-color="#00ff87"/>
            <stop offset="1" stop-color="#00d4ff"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="12" fill="url(#brandGrad)"/>
        <!-- Ascending bar chart -->
        <rect x="10" y="28" width="6" height="10" rx="1.5" fill="#0a0e1a"/>
        <rect x="18" y="22" width="6" height="16" rx="1.5" fill="#0a0e1a"/>
        <rect x="26" y="16" width="6" height="22" rx="1.5" fill="#0a0e1a"/>
        <rect x="34" y="10" width="6" height="28" rx="1.5" fill="#0a0e1a"/>
        <!-- Upward trend arrow -->
        <path d="M12 30L20 22L28 25L38 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
        <path d="M33 13H38V18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">OddsEdge</span>
        <span class="brand-version">v2</span>
      </div>
    </div>
  </div>

  <div class="sidebar-nav">
    <div class="nav-section-label">MAIN</div>
    <button class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </button>
    <button class="nav-item" data-view="arbitrage" onclick="switchView('arbitrage')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span>Arbitrage Scanner</span>
    </button>
    <button class="nav-item" data-view="value" onclick="switchView('value')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span>Value Bets</span>
    </button>

    <div class="nav-section-label">ADVISORY</div>
    <button class="nav-item" data-view="tips" onclick="switchView('tips')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span>Tips & Advisory</span>
    </button>
    <button class="nav-item nav-item-premium" data-view="alerts" onclick="switchView('alerts')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Get Alerts</span>
      <span class="nav-badge">NEW</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span class="live-text" id="statusText">Loading...</span>
    </div>
    <div class="credits-info" id="creditsBadge">—</div>
  </div>
</nav>

<!-- Main Content Area -->
<main class="main-wrapper">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="topbar-title" id="headerTitle">Dashboard</h1>
    </div>
    <div class="topbar-right">
      <div class="league-selector">
        <select id="leagueSelect" class="league-select" onchange="switchLeague(this.value)" aria-label="Select league">
          <option value="soccer_epl">&#x26BD; Premier League</option>
          <option value="soccer_spain_la_liga">&#x1F1EA;&#x1F1F8; La Liga</option>
          <option value="soccer_germany_bundesliga">&#x1F1E9;&#x1F1EA; Bundesliga</option>
          <option value="soccer_italy_serie_a">&#x1F1EE;&#x1F1F9; Serie A</option>
          <option value="soccer_france_ligue_one">&#x1F1EB;&#x1F1F7; Ligue 1</option>
          <option value="soccer_epl_cup">&#x1F3C6; FA Cup</option>
          <option value="soccer_uefa_champs_league">&#x2B50; Champions League</option>
        </select>
      </div>
      <div class="timer-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="updateTimer">30:00</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()" aria-label="Refresh data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile status bar (visible only on small screens) -->
  <div class="mobile-status-bar" id="mobileStatusBar">
    <div class="mobile-status-left">
      <span class="live-dot"></span>
      <span id="mobileStatusText">Loading...</span>
    </div>
    <div id="mobileCreditsBadge" class="mobile-credits">—</div>
  </div>

  <!-- Ticker bar -->
  <div class="ticker-bar">
    <div class="ticker-label">
      <span class="live-dot"></span> LIVE ODDS
    </div>
    <div class="ticker-track">
      <div class="ticker-scroll" id="tickerScroll"></div>
    </div>
  </div>

  <!-- Dynamic content area -->
  <div class="content-area" id="mainContent">
    <!-- Content injected by JS -->
  </div>
</main>

<script src="./app.js"></script>
